packages:
  - "apps/*"
  - "packages/*"

# Security overrides. pnpm 10+ reads `overrides` here (not the `pnpm.overrides`
# field in package.json, which newer pnpm ignores). Kept consistent with the
# single-comparator advisories already pinned for the repo.
overrides:
  "postcss@<8.5.10": ">=8.5.10"
  "flatted@<3.4.2": ">=3.4.2"
  "js-yaml@<4.2.0": ">=4.2.0"
  "brace-expansion@<1.1.13": ">=1.1.13"
  "minimatch@<3.1.4": ">=3.1.4"
  "minimatch@>=9.0.0": ">=9.0.7"
  "picomatch@<2.3.2": ">=2.3.2"
  "picomatch@>=4.0.0": ">=4.0.4"
  # drizzle-kit pulls esbuild 0.18 via the deprecated @esbuild-kit loader
  # (GHSA-67mh-4wv8-2f99, dev-server only). Pin to the patched line.
  "esbuild@<0.25.0": ">=0.25.0"

# Build scripts we intentionally do NOT run. pnpm would otherwise prompt (or
# exit non-zero in CI) for each package that ships an install script.
#
# - esbuild: its postinstall only re-validates an ALREADY-installed platform
#   binary (e.g. @esbuild/win32-x64 / @esbuild/linux-x64, a separate dep that is
#   installed regardless). On Windows that self-check misreports the version and
#   aborts install; the binary itself is correct. Skipping the script is safe on
#   every OS — it removes only the redundant check, never the binary — so Linux
#   CI is unaffected and drizzle-kit's esbuild still runs.
# - sharp: ships per-platform prebuilt binaries (@img/sharp-*), so its optional
#   native build is unnecessary; Next.js image optimisation uses the prebuilt.
allowBuilds:
  esbuild: false
  sharp: false
