name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Types · Build · Test · Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # No real secrets in CI — schema-valid placeholders so @repo/env validation
    # and the eager clients (libSQL, Better Auth) construct cleanly at build and
    # test time. NOTE: SKIP_ENV_VALIDATION is deliberately NOT used: it skips Zod
    # *defaults* too, leaving DATABASE_URL undefined and breaking the libSQL
    # client during Next's page-data collection. The Playwright webServer
    # overrides these with its own isolated temp DB + secret.
    env:
      BETTER_AUTH_SECRET: ci-placeholder-secret-not-a-real-key-0123456789
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: file:local.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm check-types

      - name: Build
        run: pnpm build

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: pnpm test:e2e

      - name: Audit dependencies
        run: pnpm audit --audit-level high
