name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Types · Build · Test · Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm check-types

      - name: Build
        run: pnpm build
        env:
          # CI has no real secrets; the env schema is exercised by the runtime
          # tests below. Skip validation here so the type/build gate doesn't need
          # production secrets.
          SKIP_ENV_VALIDATION: "true"

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        # The Playwright webServer injects its own temp DB + secret, so no repo
        # secrets are needed for the real end-to-end run.
        run: pnpm test:e2e

      - name: Audit dependencies
        run: pnpm audit --audit-level high
