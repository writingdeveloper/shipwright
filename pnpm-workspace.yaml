packages:
  - "apps/*"
  - "packages/*"

# Security overrides. pnpm 10+ reads `overrides` here (not the `pnpm.overrides`
# field in package.json, which newer pnpm ignores). Kept consistent with the
# single-comparator advisories already pinned for the repo.
overrides:
  "postcss@<8.5.10": ">=8.5.10"
  "flatted@<3.4.2": ">=3.4.2"
  "js-yaml@<4.2.0": ">=4.2.0"
  "brace-expansion@<1.1.13": ">=1.1.13"
  "minimatch@<3.1.4": ">=3.1.4"
  "minimatch@>=9.0.0": ">=9.0.7"
  "picomatch@<2.3.2": ">=2.3.2"
  "picomatch@>=4.0.0": ">=4.0.4"
  # drizzle-kit pulls esbuild 0.18 via the deprecated @esbuild-kit loader
  # (GHSA-67mh-4wv8-2f99, dev-server only). Pin to the patched line.
  "esbuild@<0.25.0": ">=0.25.0"
  # posthog-js (@repo/analytics) pulls dompurify; <=3.4.10 has an ALLOWED_ATTR
  # pollution advisory (GHSA-cmwh-pvxp-8882). Pin to the patched line.
  "dompurify@<3.4.11": ">=3.4.11"
  # Compatibility override (not an advisory): changesets' transitive
  # @manypkg/get-packages pulls read-yaml-file@1.1.0, which calls js-yaml's
  # `safeLoad` — removed in js-yaml 4. The `js-yaml@<4.2.0 -> >=4.2.0` security
  # pin above therefore breaks `changeset` (init/version/status) at workspace
  # discovery. Pinned to EXACTLY 2.1.0 (not >=): it keeps the CJS API that
  # @manypkg requires (callable default export + `.sync`) while using js-yaml 4's
  # `load`. The newer 3.0.0 is ESM-only (named exports, no `.sync`) and would
  # break @manypkg's `require(...)`/`__default`/`.sync` calls.
  "read-yaml-file@1": "2.1.0"

# Build scripts we intentionally do NOT run. pnpm would otherwise prompt (or
# exit non-zero in CI) for each package that ships an install script.
#
# - esbuild: its postinstall only re-validates an ALREADY-installed platform
#   binary (e.g. @esbuild/win32-x64 / @esbuild/linux-x64, a separate dep that is
#   installed regardless). On Windows that self-check misreports the version and
#   aborts install; the binary itself is correct. Skipping the script is safe on
#   every OS — it removes only the redundant check, never the binary — so Linux
#   CI is unaffected and drizzle-kit's esbuild still runs.
# - sharp: ships per-platform prebuilt binaries (@img/sharp-*), so its optional
#   native build is unnecessary; Next.js image optimisation uses the prebuilt.
# - core-js: pulled transitively by posthog-js. Its postinstall only attempts to
#   print a funding/ads message (wrapped in a try/catch no-op) — it builds
#   nothing — so skipping it is safe on every OS and keeps installs
#   non-interactive in CI.
# - @sentry/cli: pulled by @sentry/nextjs (@repo/observability). Like esbuild/
#   sharp it ships its binary as per-platform optionalDependencies
#   (@sentry/cli-<os>-<arch>, installed regardless); its postinstall only
#   re-fetches/validates that already-resolved binary. The binary is used ONLY for
#   source-map UPLOAD, which the build performs only when SENTRY_AUTH_TOKEN + org +
#   project are all set; with no token (dev/CI/default) nothing invokes it. So
#   skipping the script is safe on every OS and keeps installs non-interactive.
allowBuilds:
  # @parcel/watcher + @swc/core arrive transitively via next-intl (@repo/i18n).
  # next-intl ships compiled JS we consume directly, so neither native build is
  # needed at runtime — skip them (like esbuild/sharp) to keep installs
  # non-interactive on every OS. Linux CI is unaffected.
  '@parcel/watcher': false
  "@sentry/cli": false
  '@swc/core': false
  core-js: false
  esbuild: false
  sharp: false

# Supply-chain "minimum release age" exclusions. pnpm gates very fresh package
# versions by default; these analytics/email deps are newer than that window, so
# they are explicitly allowed here. Pinned by exact version so a future bump is a
# deliberate, reviewable change.
minimumReleaseAgeExclude:
  - "@posthog/core@1.35.1"
  - "@posthog/types@1.390.0"
  - posthog-js@1.390.2
  - resend@6.14.0
