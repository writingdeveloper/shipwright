name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Types · Build · Test · Audit (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Matrix across the supported Node versions. 20 is intentionally EXCLUDED:
    # pnpm 11.3 requires Node >= 22.13, and parts of the toolchain use the
    # `node:sqlite` builtin (Node 22.5+), so 20 cannot run the install at all.
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    # No real secrets in CI — schema-valid placeholders so @repo/env validation
    # and the eager clients (libSQL, Better Auth) construct cleanly at build and
    # test time. NOTE: SKIP_ENV_VALIDATION is deliberately NOT used: it skips Zod
    # *defaults* too, leaving DATABASE_URL undefined and breaking the libSQL
    # client during Next's page-data collection. The Playwright webServer
    # overrides these with its own isolated temp DB + secret.
    env:
      BETTER_AUTH_SECRET: ci-placeholder-secret-not-a-real-key-0123456789
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: file:local.db
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm check-types

      - name: Build
        run: pnpm build

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Install Playwright browser
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: E2E tests — web (Playwright)
        run: pnpm test:e2e

      - name: E2E tests — admin (Playwright)
        run: pnpm --filter admin test:e2e

      # Moderate is the right floor for a starter others clone (high alone lets
      # moderate advisories through). pnpm-workspace.yaml pins known advisories.
      - name: Audit dependencies
        run: pnpm audit --audit-level moderate
